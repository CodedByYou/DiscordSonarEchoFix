name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          dotnet-quality: 'preview'

      - name: Publish self-contained single-file exe
        run: |
          dotnet publish src/DiscordSonarEchoFix.csproj `
            -c Release `
            -p:PublishMode=SelfContained `
            -o dist

      - name: Stage signing input
        if: ${{ env.SIGNPATH_API_TOKEN != '' }}
        env:
          SIGNPATH_API_TOKEN: ${{ secrets.SIGNPATH_API_TOKEN }}
        run: |
          mkdir signing-input
          copy dist\DiscordSonarEchoFix.exe signing-input\

      # Free Microsoft-trusted code signing for OSS via SignPath. Set up at signpath.io,
      # then add SIGNPATH_ORGANIZATION_ID, SIGNPATH_PROJECT_SLUG, SIGNPATH_SIGNING_POLICY_SLUG,
      # and SIGNPATH_API_TOKEN as repo secrets. Skip silently if not configured.
      - name: Sign with SignPath
        if: ${{ env.SIGNPATH_API_TOKEN != '' }}
        uses: signpath/github-action-submit-signing-request@v1
        env:
          SIGNPATH_API_TOKEN: ${{ secrets.SIGNPATH_API_TOKEN }}
        with:
          api-token: ${{ secrets.SIGNPATH_API_TOKEN }}
          organization-id: ${{ secrets.SIGNPATH_ORGANIZATION_ID }}
          project-slug: ${{ secrets.SIGNPATH_PROJECT_SLUG }}
          signing-policy-slug: ${{ secrets.SIGNPATH_SIGNING_POLICY_SLUG }}
          artifact-configuration-slug: 'exe'
          github-artifact-id: ${{ steps.upload-unsigned.outputs.artifact-id }}
          wait-for-completion: true
          output-artifact-directory: dist

      - name: Compute SHA256
        run: |
          $hash = (Get-FileHash dist\DiscordSonarEchoFix.exe -Algorithm SHA256).Hash
          $hash | Out-File dist\DiscordSonarEchoFix.exe.sha256 -Encoding ascii
          Write-Output "SHA256: $hash"

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/DiscordSonarEchoFix.exe
            dist/DiscordSonarEchoFix.exe.sha256
          generate_release_notes: true
          fail_on_unmatched_files: true
